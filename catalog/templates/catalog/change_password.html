{% extends 'catalog/base.html' %}

{% block title %}Смена пароля{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header bg-warning">
                <h3 class="mb-0"><i class="bi bi-key"></i> Смена пароля</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Старый пароль</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Новый пароль</label>
                        <input type="password" name="new_password1" class="form-control" required>
                        <small class="text-muted">Минимум 8 символов</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Подтверждение пароля</label>
                        <input type="password" name="new_password2" class="form-control" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-lg"></i> Сменить пароль
                        </button>
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary">
                            ← Вернуться в профиль
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
