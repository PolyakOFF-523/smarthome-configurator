{% extends 'catalog/base.html' %}

{% block title %}Отклонение сборки{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">❌ Отклонение сборки</h3>
            </div>
            <div class="card-body">
                <h4>{{ build.name }}</h4>
                <p>Вы уверены, что хотите отклонить эту сборку?</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="reason" class="form-label">Причина отклонения (необязательно):</label>
                        <textarea name="reason" id="reason" class="form-control" rows="3" 
                                  placeholder="Укажите причину, почему сборка не прошла модерацию..."></textarea>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            ✅ Да, отклонить
                        </button>
                        <a href="{% url 'moderation_queue' %}" class="btn btn-secondary">
                            ← Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
