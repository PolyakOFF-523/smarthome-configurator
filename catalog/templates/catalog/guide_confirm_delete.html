{% extends 'catalog/base.html' %}

{% block title %}Удаление гайда{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">⚠️ Удаление гайда</h3>
            </div>
            <div class="card-body">
                <h4>{{ guide.title }}</h4>
                <p>Вы уверены, что хотите удалить этот гайд?</p>
                <div class="alert alert-warning">
                    <strong>Внимание!</strong> Это действие нельзя отменить.
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Да, удалить
                        </button>
                        <a href="{% url 'guide_detail' guide.slug %}" class="btn btn-secondary">
                            Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
